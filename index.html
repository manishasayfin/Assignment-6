<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Ordering Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1e1e1e;
            background-image: url('https://d1tgh8fmlzexmh.cloudfront.net/ccbp-static-website/foodbg.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            background-color: white;
            width: 320px;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .card h1 {
            color: #6c8091;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .card p {
            color: #d0b200;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .card img {
            width: 150px;
            margin: 15px 0;
        }
        .card button {
            background-color: #d0b200;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fast & Free Delivery</h1>
        <p>Delicious food delivered to your doorstep</p>
        <img src="https://ik.imagekit.io/4z8covdo9/Full%20stack/em-ginger-fried-img.png" alt="Food">
        <br>
        <button>Order Now</button>
    </div>
</body>
</html>
