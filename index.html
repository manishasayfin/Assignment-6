<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
    }
    .card {
      background-color: white;
      width: 300px;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .card img {
      width: 80px;
    }
    .card h1 {
      font-size: 22px;
      margin: 15px 0;
    }
    .card p {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .card button {
      background-color: white;
      color: #D0B200;
      border: 2px solid #D0B200;
      padding: 10px 25px;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://ik.imagekit.io/4z8covdo9/Fullstack/food-serve.png?updatedAt=1702142726430" alt="Food Service">
    <h1>Food Service</h1>
    <p>Experience fine dining at the comfort of your home. All our orders are carefully packed and arranged to give you the nothing less than perfect.</p>
    <button>Order Now</button>
  </div>
</body>
</html>
