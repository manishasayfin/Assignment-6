<!DOCTYPE html>
<html>
<head>
    <title>Food Ordering Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f6f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            background-color: white;
            width: 320px;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }
        .card img {
            width: 75px;
            height: 75px;
            margin-bottom: 10px;
        }
        .card h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 10px 0 12px 0;
            color: #000000;
            font-family: 'Poppins', sans-serif;
        }
        .card p {
            font-size: 14px;
            color: #585858;
            line-height: 1.6;
            margin: 0 0 25px 0;
            font-family: 'Poppins', sans-serif;
        }
        .card button {
            background-color: white;
            color: #D0B200;
            border: 1.5px solid #D0B200;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://ik.imagekit.io/4z8covdo9/Fullstack/food-serve.png?updatedAt=1702142726430" alt="Food Service">
        <h2>Food Service</h2>
        <p>Experience fine dining at the comfort of your home. All our orders are carefully packed and arranged to give you the nothing less than perfect.</p>
        <button>Order Now</button>
    </div>
</body>
</html>
